project:
  type: book
  output-dir: docs   # default; overridden by profile

profile:
  default: static
  group:
    - [static, workshop]

book:
  title: "Causal Learning Handbook"
  author: "Andrew Mertens"
  description: |
    A practical guide to the Causal Roadmap, Targeted Maximum Likelihood
    Estimation (TMLE), and Super Learner for modern causal inference in
    epidemiology, with emphasis on pharmacoepidemiology and clinical trial analysis.
  repo-url: https://github.com/amertens/causal-learning-handbook
  site-url: https://amertens.github.io/causal-learning-handbook/
  sidebar:
    style: docked
    search: true
  chapters:
    - index.qmd
    - 00-case-study.qmd
    - part: "Part I: Foundations"
      chapters:
        - 01-01-regression-vs-causal.qmd
        - 01-02-causal-roadmap.qmd
    - part: "Part II: Core Estimators"
      chapters:
        - 02-01-gcomputation.qmd
        - 02-02-iptw.qmd
        - 02-03-doubly-robust-tmle.qmd
        - 02-04-superlearner.qmd
    - part: "Part III: Longitudinal Causal Inference"
      chapters:
        - 03-07-longitudinal-td-confounding.qmd
        - 03-09-illustrated-ltmle.qmd
        - 03-09b-ltmle-by-hand.qmd
        - 03-03b-adherence-shift-methods.qmd
    - part: "Part IV: Diagnostics and Sensitivity Analysis"
      chapters:
        - 03-02-positivity-overlap.qmd
        - 03-05-advanced-diagnostics.qmd
        - 03-12-sensitivity-analysis.qmd
    - part: "Part V: Putting It All Together"
      chapters:
        - 05-01-applied-lmtp-workflow.qmd
    - part: "Part VI: Special Topics"
      chapters:
        - 03-04-effect-modification.qmd
        - 03-10-tmle-mediation.qmd
        - 03-11-time-to-event-competing-risks.qmd
        - 03-06-rwd-meets-rct-hybrid-designs.qmd
        - 03-06b-data-fusion-tutorial.qmd
        - 03-13-transportability-generalizability.qmd
        - 03-08-tmle-clean-room.qmd
    - part: "Synthesis"
      chapters:
        - 04-03-case-study-synthesis.qmd
    - part: "Appendices"
      chapters:
        - anotated_bibliography.Rmd
        - other_resources.Rmd

bibliography: book.bib

format:
  html:
    theme: journal
    highlight-style: dracula
    css: style.css
    toc: true
    toc-depth: 3
    number-sections: true
    code-fold: show
    code-tools: true
    code-summary: "Show code"

execute:
  freeze: auto
  warning: false
  message: false
