## Workshop profile: interactive code cells via WebR
##
## Two-step build process:
##   1. Rscript _build-workshop.R       # copies .qmd files to _workshop-src/,
##                                       # converting #| interactive: true chunks
##                                       # from {r} to {webr-r}
##   2. quarto render --profile workshop # renders from _workshop-src/
##
## Original source files are never modified.

project:
  output-dir: docs/workshop

book:
  title: "Causal Learning Handbook (Interactive Workshop)"
  site-url: https://amertens.github.io/causal-learning-handbook/workshop/

filters:
  - webr

webr:
  show-startup-message: false
  channel-type: "automatic"
  packages:
    - ggplot2
    - dplyr
    - SuperLearner
  repos:
    - https://nt-williams.r-universe.dev      # lmtp
    - https://tlverse.r-universe.dev           # sl3, tmle3, hal9001, origami
    - https://imbs-hl.r-universe.dev           # ranger (SuperLearner dependency)

format:
  html:
    code-fold: false
